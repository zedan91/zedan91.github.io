<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AZOBSS</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b1b2b;
  color: white;
}

.section {
  padding: 50px 20px;
  text-align: center;
}

.section h2 {
  margin-bottom: 30px;
  font-size: 28px;
}

/* GRID */
.services {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  max-width: 1100px;
  margin: auto;
}

/* CARD */
.card {
  background: #14283d;
  border-radius: 18px;
  padding: 15px;
  transition: 0.3s;
  cursor: pointer;
}

.card:hover {
  transform: translateY(-5px);
  background: #18324d;
}

/* IMAGE */
.card img {
  width: 100%;
  height: 160px;
  object-fit: cover;
  border-radius: 12px;
}

/* TEXT */
.card p {
  margin-top: 12px;
  font-size: 15px;
  opacity: 0.85;
}
</style>

</head>
<body>

<div class="section">
  <h2>Our Services</h2>

  <div class="services">

    <div class="card">
      <img src="images/format-windows.jpg">
      <p>Format Windows</p>
    </div>

    <div class="card">
      <img src="images/pc-repair.jpg">
      <p>PC Repair</p>
    </div>

    <div class="card">
      <img src="images/remote-support.jpg">
      <p>Troubleshoot Windows Online</p>
    </div>

    <div class="card">
      <img src="images/info-lot.jpg">
      <p>Info Lot Kadaster</p>
    </div>

    <div class="card">
      <img src="images/ukur-tanah.jpg">
      <p>Ukur Kawasan Tanah</p>
    </div>

    <div class="card">
      <img src="images/pa-pduk.jpg">
      <p>PA / PDUK Request</p>
    </div>

  </div>
</div>

</body>
</html>
