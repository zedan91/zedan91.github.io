<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSU Calculator - AZOBSS Tools</title><style>
:root{--bg:#07111f;--card:#101c2d;--card2:#13243a;--text:#eef5ff;--muted:#9fb2c8;--accent:#25d366;--blue:#3b82f6;--warn:#facc15;--danger:#ef4444}
*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:radial-gradient(circle at top,#102544,#07111f 55%);color:var(--text);line-height:1.5}
.header{padding:26px 16px;text-align:center;border-bottom:1px solid rgba(255,255,255,.08);background:rgba(0,0,0,.18)}
.header a{color:#9bd1ff;text-decoration:none}.wrap{max-width:1050px;margin:auto;padding:24px 16px}
.card{background:linear-gradient(180deg,var(--card2),var(--card));border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:20px;margin:16px 0;box-shadow:0 10px 30px rgba(0,0,0,.25)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
label{display:block;margin:10px 0 6px;color:var(--muted);font-weight:bold}
input,select,textarea{width:100%;padding:12px;border-radius:12px;border:1px solid rgba(255,255,255,.13);background:#07111f;color:var(--text);outline:none}
button,.btn{display:inline-block;padding:12px 16px;border:0;border-radius:12px;background:var(--blue);color:white;font-weight:bold;cursor:pointer;text-decoration:none;margin-top:12px}
button:hover,.btn:hover{filter:brightness(1.1)}.result{margin-top:14px;padding:15px;border-radius:14px;background:#07111f;border:1px solid rgba(255,255,255,.1);white-space:pre-wrap}
.badge{display:inline-block;padding:5px 10px;border-radius:999px;background:rgba(37,211,102,.15);color:#68ff9e;font-size:13px;margin:4px 4px 4px 0}
.muted{color:var(--muted)}.footer{text-align:center;color:var(--muted);padding:30px 10px}
.table{width:100%;border-collapse:collapse;margin-top:12px}.table th,.table td{border:1px solid rgba(255,255,255,.1);padding:10px;text-align:left}.table th{background:#0b1728}
.copy{background:#22c55e}.small{font-size:13px}
</style></head>
<body><div class="header"><h1>PSU Calculator</h1><p class="muted">AZOBSS Mini Web Tools</p><a href="../index.html">← Back to Home</a></div>
<div class="wrap">
<div class="card"><p>Estimate recommended PSU wattage for a PC build.</p><div class="grid">
<div><label>CPU TDP (W)</label><input id="cpu" type="number" value="125"></div>
<div><label>GPU TDP (W)</label><input id="gpu" type="number" value="300"></div>
<div><label>Other Components (W)</label><input id="other" type="number" value="80"></div>
<div><label>Safety Headroom (%)</label><input id="head" type="number" value="30"></div></div>
<button onclick="calcPSU()">Calculate PSU</button><div id="result" class="result"></div></div>
</div><div class="footer">© 2026 AZOBSS.COM - PC Tools & Utilities</div>
<script>
function roundPSU(w){let sizes=[450,550,650,750,850,1000,1200,1300,1500,1600];return sizes.find(s=>s>=w)||Math.ceil(w/100)*100}
function calcPSU(){let total=(+cpu.value||0)+(+gpu.value||0)+(+other.value||0);let rec=total*(1+(+head.value||0)/100);result.innerHTML=`Estimated load: <b>${total}W</b>\nRecommended minimum: <b>${Math.ceil(rec)}W</b>\nSuggested PSU size: <b>${roundPSU(rec)}W</b>`} calcPSU();
</script></body></html>
