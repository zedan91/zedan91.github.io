<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Currency Converter | AZOBSS</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
    font-family:Arial,sans-serif;
    background:radial-gradient(circle at top,#102544,#020617 60%);
    color:#fff;
    min-height:100vh;
    padding:30px 18px;
}

.container{
    max-width:1000px;
    margin:auto;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:18px;
    flex-wrap:wrap;
    margin-bottom:28px;
}

.title{
    font-size:48px;
    color:#22c55e;
    font-weight:bold;
}

.subtitle{
    color:#94a3b8;
    margin-top:8px;
}

.back-btn{
    display:inline-block;
    padding:14px 20px;
    background:#22c55e;
    color:#03130a;
    text-decoration:none;
    border-radius:14px;
    font-weight:bold;
}

.card{
    background:linear-gradient(180deg,#13243a,#0f172a);
    border:1px solid rgba(255,255,255,.08);
    border-radius:24px;
    padding:26px;
    box-shadow:0 0 30px rgba(0,0,0,.25);
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:18px;
}

label{
    display:block;
    margin-bottom:8px;
    color:#cbd5e1;
    font-weight:bold;
}

input,select{
    width:100%;
    padding:15px;
    border-radius:14px;
    border:1px solid #1e293b;
    background:#020617;
    color:white;
    outline:none;
    font-size:16px;
}

input:focus,select:focus{
    border-color:#22c55e;
    box-shadow:0 0 15px rgba(34,197,94,.2);
}

.result{
    margin-top:24px;
    background:#020617;
    border:1px solid rgba(34,197,94,.18);
    border-radius:18px;
    padding:22px;
    font-size:28px;
    font-weight:bold;
    line-height:1.5;
}

.result span{
    color:#22c55e;
}

.actions{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    margin-top:20px;
}

button{
    padding:14px 18px;
    border:0;
    border-radius:14px;
    font-weight:bold;
    cursor:pointer;
    color:white;
    background:#2563eb;
}

button.green{
    background:#22c55e;
    color:#03130a;
}

button.orange{
    background:#f97316;
}

.quick{
    margin-top:28px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
    gap:12px;
}

.quick button{
    background:#0f172a;
    border:1px solid rgba(34,197,94,.2);
    text-align:left;
}

.status{
    margin-top:18px;
    color:#94a3b8;
    font-size:14px;
    line-height:1.6;
}

.live{
    color:#22c55e;
    font-weight:bold;
}

.offline{
    color:#f97316;
    font-weight:bold;
}


.calculator-mini{
    margin-top:-45px;
    display:grid;
    grid-template-columns:minmax(260px,380px);
    justify-content:end;
}

.calc-box{
    background:#020617;
    border:1px solid rgba(34,197,94,.18);
    border-radius:18px;
    padding:16px;
}

.calc-title{
    color:#22c55e;
    font-weight:bold;
    margin-bottom:10px;
}

.calc-display{
    width:100%;
    margin-bottom:10px;
    padding:14px;
    border-radius:12px;
    border:1px solid #334155;
    background:#0f172a;
    color:#fff;
    font-size:20px;
    text-align:right;
}

.calc-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:8px;
}

.calc-grid button{
    padding:13px 0;
    border-radius:10px;
    background:#0f172a;
    border:1px solid #334155;
    color:#fff;
    font-weight:bold;
}

.calc-grid button:hover{
    background:#1e293b;
}

.calc-grid .op{
    background:#2563eb;
    border-color:#2563eb;
}

.calc-grid .clear{
    background:#ef4444;
    border-color:#ef4444;
}

.calc-grid .equal{
    background:#22c55e;
    border-color:#22c55e;
    color:#03130a;
}

.calc-use{
    width:100%;
    margin-top:10px;
    background:#f97316;
}

@media(max-width:700px){
    .calculator-mini{
        grid-template-columns:1fr;
    }
}

@media(max-width:700px){
    .grid{
        grid-template-columns:1fr;
    }

    .title{
        font-size:34px;
    }

    .result{
        font-size:22px;
    }
}

.currency-row{
    display:grid;
    grid-template-columns:1fr 44px 1fr;
    gap:10px;
    align-items:end;
    margin-top:14px;
}

.swap-middle{
    display:flex;
    justify-content:center;
    align-items:end;
    padding-bottom:9px;
}

.swap-middle-btn{
    width:38px;
    height:38px;
    border-radius:50%;
    background:#22c55e;
    color:#03130a;
    border:2px solid #0f172a;
    cursor:pointer;
    font-size:20px;
    font-weight:900;
    line-height:1;
    box-shadow:0 0 14px rgba(34,197,94,.35);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:0;
}

.swap-middle-btn:hover{
    transform:scale(1.08);
}

@media(max-width:700px){
    .currency-row{
        grid-template-columns:1fr;
    }

    .swap-middle{
        padding-bottom:0;
    }

    .swap-middle-btn{
        width:100%;
        border-radius:14px;
    }
}

</style>
</head>

<body>

<div class="container">

    <div class="header">
        <div>
            <div class="title">💱 Currency Converter</div>
            <div class="subtitle">
                Live exchange rates for shopping, travel & online payments.
            </div>
        </div>

        <a class="back-btn" href="index.html">
            ← Back To Tools
        </a>
    </div>

    <div class="card">

        <div class="grid">

            <div>
                <label>Amount</label>
                <input type="number" id="amount" value="1" min="0">
            </div>

            <div>
                <label>Fee / Markup (%)</label>
                <input type="number" id="fee" value="0" min="0" step="0.1">
            </div>

            <div>
                <label>From</label>
                <select id="from"></select>
            </div>

            <div>
                <label>To</label>
                <select id="to"></select>
            </div>

        </div>

        <div class="result" id="result">
            Loading live exchange rate...
        </div>

        <div class="actions">
            <button class="green" onclick="swapCurrencies()">
                Swap Currency
            </button>

            <button onclick="copyResult()">
                Copy Result
            </button>

            <button class="orange" onclick="resetConverter()">
                Reset
            </button>
        </div>

        <div class="calculator-mini">
            <div class="calc-box">
                <div class="calc-title">🧮 Mini Calculator</div>
                <input class="calc-display" id="calcDisplay" type="text" value="0" readonly>

                <div class="calc-grid">
                    <button class="clear" onclick="calcClear()">C</button>
                    <button onclick="calcBack()">⌫</button>
                    <button onclick="calcPress('%')">%</button>
                    <button class="op" onclick="calcPress('/')">÷</button>

                    <button onclick="calcPress('7')">7</button>
                    <button onclick="calcPress('8')">8</button>
                    <button onclick="calcPress('9')">9</button>
                    <button class="op" onclick="calcPress('*')">×</button>

                    <button onclick="calcPress('4')">4</button>
                    <button onclick="calcPress('5')">5</button>
                    <button onclick="calcPress('6')">6</button>
                    <button class="op" onclick="calcPress('-')">−</button>

                    <button onclick="calcPress('1')">1</button>
                    <button onclick="calcPress('2')">2</button>
                    <button onclick="calcPress('3')">3</button>
                    <button class="op" onclick="calcPress('+')">+</button>

                    <button onclick="calcPress('0')">0</button>
                    <button onclick="calcPress('.')">.</button>
                    <button class="equal" onclick="calcEqual()">=</button>
                    <button class="op" onclick="calcUseAmount()">Use</button>
                </div>

                <button class="calc-use" onclick="calcUseAmount()">Use Result As Amount</button>
            </div>
        </div>

        <div class="status" id="status">
            Loading live exchange rates...
        </div>

    </div>

</div>

<script>

const fallbackRates = {
    USD:1,
    MYR:4.70,
    SGD:1.35,
    IDR:16200,
    THB:36.5,
    CNY:7.25,
    JPY:155,
    KRW:1380,
    EUR:0.92,
    GBP:0.79,
    AUD:1.52,
    NZD:1.65,
    PHP:58,
    INR:83.5,
    AED:3.67,
    SAR:3.75
};

let rates = {...fallbackRates};

const amount = document.getElementById("amount");
const fee = document.getElementById("fee");
const from = document.getElementById("from");
const to = document.getElementById("to");
const result = document.getElementById("result");
const statusBox = document.getElementById("status");

function loadCurrencies(){

    Object.keys(rates).forEach(code => {

        const option1 = document.createElement("option");
        option1.value = code;
        option1.textContent = code;

        const option2 = document.createElement("option");
        option2.value = code;
        option2.textContent = code;

        from.appendChild(option1);
        to.appendChild(option2);
    });

    from.value = "MYR";
    to.value = "USD";
}

function formatMoney(value, code){

    try{
        return new Intl.NumberFormat("en-US",{
            style:"currency",
            currency:code,
            maximumFractionDigits:2
        }).format(value);
    }catch(e){
        return value.toFixed(2) + " " + code;
    }
}

function calculate(){

    const value = parseFloat(amount.value) || 0;
    const feeValue = parseFloat(fee.value) || 0;

    const usd = value / rates[from.value];
    let converted = usd * rates[to.value];

    if(feeValue > 0){
        converted += converted * (feeValue / 100);
    }

    result.innerHTML = `
        ${formatMoney(value, from.value)}
        =
        <span>${formatMoney(converted, to.value)}</span>
        <br>
        <small style="font-size:14px;color:#94a3b8;">
            Included fee: ${feeValue}%
        </small>
    `;
}

function swapCurrencies(){

    const oldFrom = from.value;

    from.value = to.value;
    to.value = oldFrom;

    calculate();
}

function copyResult(){

    navigator.clipboard.writeText(result.innerText);

    alert("Copied!");
}

function resetConverter(){

    amount.value = 1;
    fee.value = 0;
    from.value = "MYR";
    to.value = "USD";

    calculate();
}

function quickConvert(v,f,t){

    amount.value = v;
    from.value = f;
    to.value = t;

    calculate();

    window.scrollTo({
        top:0,
        behavior:"smooth"
    });
}

async function fetchLiveRates(){

    try{

        const response = await fetch("https://open.er-api.com/v6/latest/USD");

        const data = await response.json();

        if(data && data.rates){

            rates = data.rates;

            statusBox.innerHTML = `
                <span class="live">● LIVE Exchange Rates Connected</span><br>
                Source: open.er-api.com
            `;

            calculate();

        }else{
            throw new Error("API error");
        }

    }catch(error){

        rates = {...fallbackRates};

        statusBox.innerHTML = `
            <span class="offline">● Offline fallback rates loaded</span><br>
            Internet/API unavailable.
        `;

        calculate();
    }
}

[amount, fee, from, to].forEach(el => {

    el.addEventListener("input", calculate);
    el.addEventListener("change", calculate);
});


function calcPress(value){
    const display = document.getElementById("calcDisplay");

    if(display.value === "0" || display.value === "Error"){
        display.value = value;
    }else{
        display.value += value;
    }
}

function calcClear(){
    document.getElementById("calcDisplay").value = "0";
}

function calcBack(){
    const display = document.getElementById("calcDisplay");

    if(display.value.length <= 1 || display.value === "Error"){
        display.value = "0";
    }else{
        display.value = display.value.slice(0,-1);
    }
}

function calcEqual(){
    const display = document.getElementById("calcDisplay");

    try{
        const safe = display.value.replace(/[^0-9+\-*/%.]/g,"");
        const answer = Function('"use strict";return (' + safe + ')')();

        display.value = Number.isFinite(answer) ? parseFloat(answer.toFixed(8)) : "Error";
    }catch(e){
        display.value = "Error";
    }
}

function calcUseAmount(){
    const display = document.getElementById("calcDisplay");

    if(display.value === "Error"){
        return;
    }

    calcEqual();

    const value = parseFloat(display.value);

    if(!isNaN(value)){
        amount.value = value;
        calculate();
    }
}

loadCurrencies();
fetchLiveRates();

</script>

</body>
</html>
