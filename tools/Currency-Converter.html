<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Currency Converter | AZOBSS</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
    font-family:Arial,sans-serif;
    background:radial-gradient(circle at top,#102544,#020617 60%);
    color:#fff;
    min-height:100vh;
    padding:30px 18px;
}

.container{
    max-width:1000px;
    margin:auto;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:18px;
    flex-wrap:wrap;
    margin-bottom:28px;
}

.title{
    font-size:48px;
    color:#22c55e;
    font-weight:bold;
}

.subtitle{
    color:#94a3b8;
    margin-top:8px;
}

.back-btn{
    display:inline-block;
    padding:14px 20px;
    background:#22c55e;
    color:#03130a;
    text-decoration:none;
    border-radius:14px;
    font-weight:bold;
}

.card{
    background:linear-gradient(180deg,#13243a,#0f172a);
    border:1px solid rgba(255,255,255,.08);
    border-radius:24px;
    padding:26px;
    box-shadow:0 0 30px rgba(0,0,0,.25);
}

/* Top row: Amount + Fee */
.grid-top{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:18px;
}

label{
    display:block;
    margin-bottom:8px;
    color:#cbd5e1;
    font-weight:bold;
}

input,select{
    width:100%;
    padding:15px;
    border-radius:14px;
    border:1px solid #1e293b;
    background:#020617;
    color:white;
    outline:none;
    font-size:16px;
}

input:focus,select:focus{
    border-color:#22c55e;
    box-shadow:0 0 15px rgba(34,197,94,.2);
}

/* Currency row: From [swap] To */
.currency-row{
    display:grid;
    grid-template-columns:1fr 70px 1fr;
    align-items:end;
    gap:18px;
    margin-top:18px;
}

.swap-center-box{
    display:flex;
    align-items:center;
    justify-content:center;
    padding-bottom:2px;
}

.swap-middle-btn{
    width:56px;
    height:56px;
    border-radius:14px;
    background:#07111f;
    border:1px solid rgba(255,255,255,.15);
    color:#22c55e;
    font-size:22px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 0 18px rgba(0,0,0,.45);
    transition:transform .15s, border-color .15s;
}

.swap-middle-btn:hover{
    transform:scale(1.07);
    border-color:#22c55e;
}

/* Bottom area: result left, calculator right */
.bottom-row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:18px;
    margin-top:24px;
    align-items:start;
}

.result{
    background:#020617;
    border:1px solid rgba(34,197,94,.18);
    border-radius:18px;
    padding:22px;
    font-size:28px;
    font-weight:bold;
    line-height:1.5;
}

.result span{
    color:#22c55e;
}

.actions{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    margin-top:16px;
}

button{
    padding:14px 18px;
    border:0;
    border-radius:14px;
    font-weight:bold;
    cursor:pointer;
    color:white;
    background:#2563eb;
}

button.green{
    background:#22c55e;
    color:#03130a;
}

button.orange{
    background:#f97316;
}

/* Calculator */
.calc-box{
    background:#020617;
    border:1px solid rgba(34,197,94,.18);
    border-radius:18px;
    padding:16px;
}

.calc-title{
    color:#22c55e;
    font-weight:bold;
    margin-bottom:10px;
}

.calc-display{
    width:100%;
    margin-bottom:10px;
    padding:14px;
    border-radius:12px;
    border:1px solid #334155;
    background:#0f172a;
    color:#fff;
    font-size:20px;
    text-align:right;
}

.calc-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:8px;
}

.calc-grid button{
    padding:13px 0;
    border-radius:10px;
    background:#0f172a;
    border:1px solid #334155;
    color:#fff;
    font-weight:bold;
}

.calc-grid button:hover{
    background:#1e293b;
}

.calc-grid .op{
    background:#2563eb;
    border-color:#2563eb;
}

.calc-grid .clear{
    background:#ef4444;
    border-color:#ef4444;
}

.calc-grid .equal{
    background:#22c55e;
    border-color:#22c55e;
    color:#03130a;
}

.calc-use-btn{
    width:100%;
    margin-top:10px;
    background:#f97316;
    padding:14px 18px;
    border:0;
    border-radius:14px;
    font-weight:bold;
    cursor:pointer;
    color:white;
}

.status{
    margin-top:18px;
    color:#94a3b8;
    font-size:14px;
    line-height:1.6;
}

.live{color:#22c55e;font-weight:bold;}
.offline{color:#f97316;font-weight:bold;}

@media(max-width:700px){
    .grid-top{grid-template-columns:1fr;}
    .currency-row{grid-template-columns:1fr 56px 1fr;}
    .bottom-row{grid-template-columns:1fr;}
    .title{font-size:34px;}
    .result{font-size:22px;}
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <div>
            <div class="title">💱 Currency Converter</div>
            <div class="subtitle">
                Live exchange rates for shopping, travel &amp; online payments.
            </div>
        </div>

        <a class="back-btn" href="index.html">
            ← Back To Tools
        </a>
    </div>

    <div class="card">

        <!-- Amount + Fee row -->
        <div class="grid-top">
            <div>
                <label>Amount</label>
                <input type="number" id="amount" value="1" min="0">
            </div>
            <div>
                <label>Fee / Markup (%)</label>
                <input type="number" id="fee" value="0" min="0" step="0.1">
            </div>
        </div>

        <!-- From [⇄] To row -->
        <div class="currency-row">
            <div>
                <label>From</label>
                <select id="from"></select>
            </div>

            <div class="swap-center-box">
                <button class="swap-middle-btn" onclick="swapCurrencies()" title="Swap currencies">⇄</button>
            </div>

            <div>
                <label>To</label>
                <select id="to"></select>
            </div>
        </div>

        <!-- Result (left) + Mini Calculator (right) -->
        <div class="bottom-row">

            <!-- Left: result + action buttons -->
            <div>
                <div class="result" id="result">
                    Loading live exchange rate...
                </div>

                <div class="actions">
                    <button class="green" onclick="swapCurrencies()">Swap Currency</button>
                    <button onclick="copyResult()">Copy Result</button>
                    <button class="orange" onclick="resetConverter()">Reset</button>
                </div>
            </div>

            <!-- Right: mini calculator -->
            <div class="calc-box">
                <div class="calc-title">🧮 Mini Calculator</div>
                <input class="calc-display" id="calcDisplay" type="text" value="0" readonly>

                <div class="calc-grid">
                    <button class="clear" onclick="calcClear()">C</button>
                    <button onclick="calcBack()">⌫</button>
                    <button onclick="calcPress('%')">%</button>
                    <button class="op" onclick="calcPress('/')">÷</button>

                    <button onclick="calcPress('7')">7</button>
                    <button onclick="calcPress('8')">8</button>
                    <button onclick="calcPress('9')">9</button>
                    <button class="op" onclick="calcPress('*')">×</button>

                    <button onclick="calcPress('4')">4</button>
                    <button onclick="calcPress('5')">5</button>
                    <button onclick="calcPress('6')">6</button>
                    <button class="op" onclick="calcPress('-')">−</button>

                    <button onclick="calcPress('1')">1</button>
                    <button onclick="calcPress('2')">2</button>
                    <button onclick="calcPress('3')">3</button>
                    <button class="op" onclick="calcPress('+')">+</button>

                    <button onclick="calcPress('0')">0</button>
                    <button onclick="calcPress('.')">.</button>
                    <button class="equal" onclick="calcEqual()">=</button>
                    <button class="op" onclick="calcUseAmount()">Use</button>
                </div>

                <button class="calc-use-btn" onclick="calcUseAmount()">Use Result As Amount</button>
            </div>

        </div>

        <div class="status" id="status">
            Loading live exchange rates...
        </div>

    </div>

</div>

<script>

const fallbackRates = {
    USD:1,MYR:4.70,SGD:1.35,IDR:16200,THB:36.5,
    CNY:7.25,JPY:155,KRW:1380,EUR:0.92,GBP:0.79,
    AUD:1.52,NZD:1.65,PHP:58,INR:83.5,AED:3.67,SAR:3.75
};

let rates = {...fallbackRates};

const amount  = document.getElementById("amount");
const fee     = document.getElementById("fee");
const from    = document.getElementById("from");
const to      = document.getElementById("to");
const result  = document.getElementById("result");
const statusBox = document.getElementById("status");

function loadCurrencies(){
    Object.keys(rates).forEach(code => {
        const o1 = document.createElement("option"); o1.value=code; o1.textContent=code;
        const o2 = document.createElement("option"); o2.value=code; o2.textContent=code;
        from.appendChild(o1);
        to.appendChild(o2);
    });
    from.value = "MYR";
    to.value   = "USD";
}

function formatMoney(value, code){
    try{
        return new Intl.NumberFormat("en-US",{style:"currency",currency:code,maximumFractionDigits:2}).format(value);
    }catch(e){
        return value.toFixed(2) + " " + code;
    }
}

function calculate(){
    const value    = parseFloat(amount.value) || 0;
    const feeValue = parseFloat(fee.value)    || 0;
    const usd      = value / rates[from.value];
    let   converted = usd * rates[to.value];
    if(feeValue > 0) converted += converted * (feeValue / 100);

    result.innerHTML = `
        ${formatMoney(value, from.value)}
        =
        <span>${formatMoney(converted, to.value)}</span>
        <br>
        <small style="font-size:14px;color:#94a3b8;">Included fee: ${feeValue}%</small>
    `;
}

function swapCurrencies(){
    const old = from.value;
    from.value = to.value;
    to.value   = old;
    calculate();
}

function copyResult(){
    navigator.clipboard.writeText(result.innerText);
    alert("Copied!");
}

function resetConverter(){
    amount.value = 1;
    fee.value    = 0;
    from.value   = "MYR";
    to.value     = "USD";
    calculate();
}

async function fetchLiveRates(){
    try{
        const response = await fetch("https://open.er-api.com/v6/latest/USD");
        const data     = await response.json();
        if(data && data.rates){
            rates = data.rates;
            statusBox.innerHTML = `<span class="live">● LIVE Exchange Rates Connected</span><br>Source: open.er-api.com`;
            calculate();
        }else{ throw new Error("API error"); }
    }catch(error){
        rates = {...fallbackRates};
        statusBox.innerHTML = `<span class="offline">● Offline fallback rates loaded</span><br>Internet/API unavailable.`;
        calculate();
    }
}

[amount, fee, from, to].forEach(el => {
    el.addEventListener("input",  calculate);
    el.addEventListener("change", calculate);
});

/* Calculator */
function calcPress(value){
    const d = document.getElementById("calcDisplay");
    if(d.value === "0" || d.value === "Error") d.value = value;
    else d.value += value;
}
function calcClear(){ document.getElementById("calcDisplay").value = "0"; }
function calcBack(){
    const d = document.getElementById("calcDisplay");
    if(d.value.length <= 1 || d.value === "Error") d.value = "0";
    else d.value = d.value.slice(0,-1);
}
function calcEqual(){
    const d = document.getElementById("calcDisplay");
    try{
        const safe   = d.value.replace(/[^0-9+\-*/%.]/g,"");
        const answer = Function('"use strict";return (' + safe + ')')();
        d.value = Number.isFinite(answer) ? parseFloat(answer.toFixed(8)) : "Error";
    }catch(e){ d.value = "Error"; }
}
function calcUseAmount(){
    const d = document.getElementById("calcDisplay");
    if(d.value === "Error") return;
    calcEqual();
    const value = parseFloat(d.value);
    if(!isNaN(value)){ amount.value = value; calculate(); }
}

loadCurrencies();
fetchLiveRates();

</script>
</body>
</html>
